version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gorrent_db
    environment:
      POSTGRES_USER: gorrent_user
      POSTGRES_PASSWORD: gorrent_password
      POSTGRES_DB: gorrent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gorrent_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gorrent_user -d gorrent_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gorrent_app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gorrent_user
      DB_PASSWORD: gorrent_password
      DB_NAME: gorrent_db
      DB_SSL_MODE: disable
      SERVER_PORT: 8080
      SERVER_MODE: release
      JWT_SECRET: "production-secret-key-change-this"
      JWT_EXPIRATION_HOURS: 24
      ENV: production
    volumes:
      - .:/app
    networks:
      - gorrent_network

volumes:
  postgres_data:

networks:
  gorrent_network:
    driver: bridge